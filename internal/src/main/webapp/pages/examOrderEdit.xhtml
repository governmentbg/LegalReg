<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:f="jakarta.faces.core"
                xmlns:jsf="jakarta.faces"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ibg="jakarta.faces.composite/components"
                template="/template/template.xhtml">

    <ui:define name="metadata">
        <f:metadata>
            <f:viewAction action="#{userData.checkReloadPage}" onPostback="false" />
            <f:viewAction action="#{userData.checkPageAccess(208)}" onPostback="false"/>
            <f:importConstants type="com.ib.urireg.system.UriregConstants"/>
        </f:metadata>
    </ui:define>

    <ui:define name="title">#{navTexts['/pages/examinationOrder.xhtml']}</ui:define>

    <ui:define name="viewname">

        <li><p:commandLink title="#{ui_labels['general.back']}" action="#{navigation.goBack()}" rendered="#{navigation.navPath.size()>1}">
            <i class="fas fa-caret-left"/>
        </p:commandLink>
        </li>

        <li>#{navTexts['/pages/examinationOrder.xhtml']}</li>
    </ui:define>

    <ui:define name="content">

        <h:form id="formExamOrder" enctype="multipart/form-data">

            <div class="#{guestPreferences.containerPosition}" jsf:rendered="#{examOrderEdit.exam ne null}">

                <div class="card">

                    <p:toolbar id="tlbButton">

                        <f:facet name="left">
                            <p:commandButton icon="fas fa-save" value="#{ui_labels['general.save']}" id="btnSave" action="#{examOrderEdit.actionSave}"
                                             update="formExamOrder" process="@form">
                            </p:commandButton>

                            <span class="fas fa-ellipsis-v SoftGray mx-2" jsf:rendered="#{examOrderEdit.protCase.id eq null and examOrderEdit.viewBtnCase and !examOrderEdit.do2019}"/>

                            <p:commandButton icon="fas fa-tasks" value="#{labels['examOrder.protocolCase']}" id="caseProtocol" action="#{examOrderEdit.actionViewPanelCase}"
                                             update="formExamOrder" partialSubmit="true" process="formExamOrder @this"
                                             rendered="#{examOrderEdit.protCase.id eq null and examOrderEdit.viewBtnCase and !examOrderEdit.do2019}">
                            </p:commandButton>
                        </f:facet>

                        <f:facet name="right">
                            <p:commandButton icon="fas fa-times" id="btnDelete" action="#{examOrderEdit.actionDelete}"
                                             value="#{ui_labels['general.delete']}" update="formExamOrder"
                                             partialSubmit="true" process="formExamOrder @this" styleClass="ui-button-danger  ml-2"
                                            rendered="#{examOrderEdit.orderExam.id ne null}" disabled="#{examOrderEdit.countEnteredTestResult > 0 and examOrderEdit.notViewBtnDelOrderExam}">
                                <p:confirm header="#{ui_labels['general.comfirmation']}" message="#{beanMessages['general.confirmDeleteMsg']}" icon="fas fa-exclamation-triangle" />
                            </p:commandButton>
                        </f:facet>

                    </p:toolbar>

                    <br />

                    <p:panel toggleable="true" toggleSpeed="500" widgetVar="examOrder">

                        <f:facet name="header">

                            <h:outputText value="#{labels['examOrder.examinationOrder']}" styleClass="form-label"/>

                            <span class="fas fa-ellipsis-v SoftGray mx-2" jsf:rendered="#{examOrderEdit.orderExam.id ne null}"/>

                            <p:commandButton icon="fas fa-file-alt" value="#{labels['examOrder.generateOrder']}"
                                    id="generateOrder" actionListener="#{examOrderEdit.actionGenerateOrder()}" update="formExamOrder compUdostDoc"
                                    partialSubmit="true" styleClass="ui-button-success" process="formExamOrder @this"
                                    rendered="#{examOrderEdit.orderExam.id ne null}"/>

                            <span class="fas fa-ellipsis-v SoftGray mx-2" jsf:rendered="#{examOrderEdit.orderExam.id ne null}"/>

                            <p:commandButton icon="fas fa-users" value="#{labels['examOrder.examPersons']}" id="examPersons" action="#"
                                    update="formExamOrder compUdostDoc" partialSubmit="true" process="formExamOrder @this" styleClass="ui-button-success"
                                    rendered="#{examOrderEdit.orderExam.id ne null}"
                                    actionListener="#{examOrderEdit.actionGeneratePersonList()}"/>

                            <h:panelGroup id="pRegInfoOrderExam" rendered="#{examOrderEdit.orderExam.id ne null}">
                                <ibg:compObjAudit idObj="#{examOrderEdit.orderExam.id}"
                                                  codeObj="#{UriregConstants.CODE_ZNACHENIE_JOURNAL_DOC}"
                                                  identInfo="#{examOrderEdit.orderExam.identInfo}"/>
                            </h:panelGroup>

                        </f:facet>

                        <ibg:compUdostDokument id="compUdostDoc"
                                headerTitle="#{systemData.decodeItem(UriregConstants.CODE_CLASSIF_SHABLONI, examOrderEdit.vidUdostDok, examOrderEdit.currentLang, null)}"
                                binding="#{examOrderEdit.bindCompUdostDoc}" isEditable="true"
                                docId="#{examOrderEdit.orderExam.id}" parentObjectId="#{examOrderEdit.orderExam.id}"
                                vidDok="#{examOrderEdit.vidUdostDok}"
                                actionAfterGenerate="#{examOrderEdit.actionViewFile()}" update="formExamOrder:filesList"/>

                        <div jsf:id="examOrder" class="flex align-items-stretch">

                            <div class="col-8 md:col-8 lg:col-8 xl:col-8">

                                <div class="grid align-items-end">

                                    <div class="title-group">

                                        <p:commandLink class="extended-search-toggle expanded" onclick="toggleSection(this, '#basicData')" >
                                            <h:outputText value="#{labels['examOrder.basicData']}"/>
                                            <i class="fas fa-caret-right"></i>
                                        </p:commandLink>

                                    </div>

                                    <div id="basicData" class="grid ui-fluid">

                                        <div class="col-12 md:col-12 lg:col-12 xl:col-12">
                                            <p:selectBooleanCheckbox value="#{examOrderEdit.do2019}" itemLabel="#{labels['examOrder.do2019']}" styleClass="form-label" disabled="#{examOrderEdit.orderExam.id ne null}">
                                                <p:ajax event="change" update="formExamOrder:dateAndHourExamTest formExamOrder:dTimeTest formExamOrder:locationTest formExamOrder:dateAndHourExamCase formExamOrder:caseLocationExam formExamOrder:panelPersonsInProt"
                                                        listener="#{examOrderEdit.actionChangeDo2019}" />
                                            </p:selectBooleanCheckbox>
                                        </div>

                                        <!-- Заявления до дата  -->
                                        <div class="col-12 md:col-6 lg:col-2 xl:col-2">
                                            <h:outputText value="#{labels['examOrder.zaiavDate']}" styleClass="form-label req" style="white-space: nowrap;"/>
                                            <p:datePicker id="zaiavDate" value="#{examOrderEdit.orderExam.zaiavDate}" mask="true" pattern="dd.MM.yyyy" locale="bg"
                                                          showIcon="true" disabled="#{examOrderEdit.orderExam.id ne null}">
                                                <p:ajax event="change" update="formExamOrder:panelPersonsInProt formExamOrder:dateAndHourExam formExamOrder:dateAndHourCase formExamOrder:dateOrder" listener="#{examOrderEdit.actionViewLicaInProt}"/>
                                                <p:ajax event="select" update="formExamOrder:panelPersonsInProt formExamOrder:dateAndHourExam formExamOrder:dateAndHourCase formExamOrder:dateOrder" listener="#{examOrderEdit.actionViewLicaInProt}"/>
                                                <p:ajax event="input" update="formExamOrder:panelPersonsInProt formExamOrder:dateAndHourExam formExamOrder:dateAndHourCase formExamOrder:dateOrder" listener="#{examOrderEdit.actionViewLicaInProt}"/>
                                            </p:datePicker>
                                        </div>

                                        <!-- Номер на заповед -->
                                        <div class="col-12 md:col-6 lg:col-2 xl:col-2">

                                            <h:outputText value="#{labels['examOrder.nomOrder']}" styleClass="form-label"/>

                                            <div class="ui-inputgroup">
                                                <p:inputText value="#{examOrderEdit.orderExam.rnDoc}" id="nomOrder" />
                                                <p:commandButton icon="pi pi-copy" styleClass="ui-button" action="#{examOrderEdit.actionSetPrefixToRnDoc}"
                                                                 update="@this nomOrder" title="#{labels['traineeshipOrder.prefix']}"
                                                                 rendered="#{empty examOrderEdit.orderExam.rnDoc and not examOrderEdit.prefix}"/>
                                            </div>

                                        </div>

                                        <!-- Дата на заповед  -->
                                        <div class="col-12 md:col-6 lg:col-2 xl:col-2">
                                            <h:outputText value="#{labels['examOrder.dateOrder']}" styleClass="form-label"/>
                                            <p:datePicker id="dateOrder" value="#{examOrderEdit.orderExam.docDate}" mask="true" pattern="dd.MM.yyyy" locale="bg"
                                                          showIcon="true" mindate="#{examOrderEdit.orderExam.zaiavDate}"/>
                                        </div>

                                        <div class="col-12 md:col-6 lg:col-6 xl:col-6"></div>

                                        <!-- Дата  - тест -->
                                        <div class="col-6 md:col-6 lg:col-2 xl:col-2" jsf:id="dateAndHourExamTest">
                                            <div jsf:rendered="#{!examOrderEdit.do2019}">
                                                <h:outputText value="#{labels['examOrder.dateExamTest']}" styleClass="form-label req"/>
                                                <p:datePicker id="dateAndHourExam" value="#{examOrderEdit.exam.testDate}" mask="true" pattern="dd.MM.yyyy" locale="bg" mindate="#{examOrderEdit.orderExam.zaiavDate}"
                                                              showIcon="true"  disabled="#{examOrderEdit.orderExam.id ne null and examOrderEdit.orderExam.rnDoc ne null and examOrderEdit.orderExam.rnDoc ne ''}">
                                                    <p:ajax event="change" update="formExamOrder:dateProtIzpit" listener="#{examOrderEdit.actionChangeDateTest}"/>
                                                    <p:ajax event="select" update="formExamOrder:dateProtIzpit" listener="#{examOrderEdit.actionChangeDateTest}"/>
                                                    <p:ajax event="input" update="formExamOrder:dateProtIzpit" listener="#{examOrderEdit.actionChangeDateTest}"/>
                                                </p:datePicker>
                                            </div>
                                        </div>
                                        <!--   час - тест -->
                                        <div class="col-6 md:col-6 lg:col-2 xl:col-2" jsf:id="dTimeTest">
                                            <div jsf:rendered="#{!examOrderEdit.do2019}">
                                                <h:outputText value="#{labels['examOrder.hourExam']}" styleClass="form-label req"/>
                                                <p:datePicker id="timeExamTest" value="#{examOrderEdit.timeTest}"  timeOnly="true" mask="true" pattern="HH:mm" locale="bg" timeInput="true"
                                                                disabled="#{examOrderEdit.orderExam.id ne null and examOrderEdit.orderExam.rnDoc ne null and examOrderEdit.orderExam.rnDoc ne ''}">
                                                </p:datePicker>
                                            </div>
                                        </div>

                                        <!-- Място на провеждане на тест -->
                                        <div class="col-12 md:col-12 lg:col-8 xl:col-8" jsf:id="locationTest">
                                            <div jsf:rendered="#{!examOrderEdit.do2019}">
                                                <h:outputText value="#{labels['examOrder.placeExamTest']}" styleClass="form-label req"/>
                                                <p:inputText value="#{examOrderEdit.exam.testLocation}" id="testLocation" disabled="#{examOrderEdit.orderExam.id ne null and examOrderEdit.orderExam.rnDoc ne null and examOrderEdit.orderExam.rnDoc ne ''}"/>
                                            </div>
                                        </div>

                                        <!-- Дата и час - казус -->
                                        <div class="col-6 md:col-6 lg:col-2 xl:col-2" jsf:id="dateAndHourExamCase">
                                            <h:outputText value="#{examOrderEdit.do2019 ? labels['examOrder.dateExam'] : labels['examOrder.dateExamCase']}" styleClass="form-label req"/>
                                            <p:datePicker id="dateAndHourCase" value="#{examOrderEdit.exam.caseDate}" mask="true" pattern="dd.MM.yyyy " locale="bg" mindate="#{examOrderEdit.orderExam.zaiavDate}"
                                                              showIcon="true"  disabled="#{examOrderEdit.orderExam.id ne null and examOrderEdit.orderExam.rnDoc ne null and examOrderEdit.orderExam.rnDoc ne ''}">
                                                <p:ajax event="change" update="formExamOrder:dateProtCase" listener="#{examOrderEdit.actionChangeDateCase}"/>
                                                <p:ajax event="select" update="formExamOrder:dateProtCase" listener="#{examOrderEdit.actionChangeDateCase}"/>
                                                <p:ajax event="input" update="formExamOrder:dateProtCase" listener="#{examOrderEdit.actionChangeDateCase}"/>
                                            </p:datePicker>
                                        </div>
                                        <!--   час - казус -->
                                        <div class="col-6 md:col-6 lg:col-2 xl:col-2" jsf:id="dTimeCase">
                                            <h:outputText value="#{labels['examOrder.hourExam']}" styleClass="form-label req"/>
                                            <p:datePicker id="timeExamCase" value="#{examOrderEdit.timeCase}"  timeOnly="true" mask="true" pattern="HH:mm" locale="bg" timeInput="true"
                                                          disabled="#{examOrderEdit.orderExam.id ne null and examOrderEdit.orderExam.rnDoc ne null and examOrderEdit.orderExam.rnDoc ne ''}">
                                            </p:datePicker>
                                        </div>
                                        <!-- Място на провеждане на казус -->
                                        <div class="col-12 md:col-12 lg:col-8 xl:col-8" jsf:id="caseLocationExam">
                                            <h:outputText value="#{examOrderEdit.do2019 ? labels['examOrder.placeExam'] : labels['examOrder.placeExamCase']}" styleClass="form-label req"/>
                                            <p:inputText value="#{examOrderEdit.exam.caseLocation}" id="caseLocation" disabled="#{examOrderEdit.orderExam.id ne null and examOrderEdit.orderExam.rnDoc ne null and examOrderEdit.orderExam.rnDoc ne ''}"/>
                                        </div>

                                        <!-- Изготвил  -->
                                        <div class="col-12 md:col-6 lg:col-4 xl:col-4">
                                            <h:outputText value="#{labels['examOrder.izgotvil']}" styleClass="form-label"/>
                                            <ibg:selectOneModalA id="izgotvil" header="#{labels['examOrder.izgotvil']}"
                                                                 codeClassif="#{UriregConstants.CODE_CLASSIF_ADMIN_STR}"
                                                                 selectedCode="#{examOrderEdit.orderExam.codeIzgotvil}"
                                                                 dateClassif="#{examOrderEdit.decodeDate}"
                                                                 saveStateTree="true" filtered="false"
                                                                 styleAutoComp="width:99%;"
                                                                 compType="2" minQueryLength="3"
                                                                 withBtnClear="true"  isSelectNode="false"
                                                                 dopInfoAutoComp="false" itemtipAtPosition="center bottom"/>
                                        </div>

                                        <!-- Съгласували  -->
                                        <div class="col-12 md:col-6 lg:col-8 xl:col-8">
                                            <h:outputText value="#{labels['examOrder.saglasuvali'] }" styleClass="form-label"/>
                                            <ibg:selectManyModalA id="saglasuvali" compType="2" maxResults="50"
                                                                  codeClassif="#{UriregConstants.CODE_CLASSIF_ADMIN_STR}"
                                                                  selectedCodes="#{examOrderEdit.orderExam.codeSaglList}"
                                                                  selectedClassifs="#{examOrderEdit.codeSaglClassif}"
                                                                  dateClassif="#{examOrderEdit.decodeDate}"
                                                                  showRadioBtn="false"
                                                                  styleAutoComp="width:100%;"
                                                                  withBtnClear="true"
                                                                  itemtipAtPosition="center bottom"
                                                                  header="#{labels['examOrder.saglasuvali']}"
                                                                  isSelectNode="false"
                                                                  modalPosition="top"
                                                                  percentAutoComp="true"/>
                                        </div>

                                        <!-- Подписал  -->
                                        <div class="col-12 md:col-6 lg:col-4 xl:col-4">
                                            <h:outputText value="#{labels['examOrder.podpisal']}" styleClass="form-label"/>
                                            <ibg:selectOneModalA id="podpisal" header="#{labels['examOrder.podpisal']}"
                                                                 codeClassif="#{UriregConstants.CODE_CLASSIF_ADMIN_STR}"
                                                                 selectedCode="#{examOrderEdit.orderExam.codePodpisal}"
                                                                 dateClassif="#{examOrderEdit.decodeDate}"
                                                                 saveStateTree="true" filtered="false"
                                                                 styleAutoComp="width:99%;"
                                                                 compType="2" minQueryLength="3"
                                                                 withBtnClear="true"  isSelectNode="false"
                                                                 dopInfoAutoComp="false" itemtipAtPosition="center bottom"/>
                                        </div>

                                        <!-- Доп. информация -->
                                        <div class="col-12 md:col-6 lg:col-8 xl:col-8">
                                            <h:outputText value="#{labels['examOrder.dopInfo']}" styleClass="form-label"/>
                                            <p:inputTextarea id="dopInfo" value="#{examOrderEdit.orderExam.docInfo}" rows="2" />
                                        </div>

                                    </div>

                                </div>

                            </div>

                           <p:divider layout="vertical" />

                            <div class="col-4 md:col-4 lg:col-4 xl:col-4">

                                <div class="grid">

                                    <div class="col-12 ui-fluid">

                                        <div class="title-group">

                                            <p:commandLink class="extended-search-toggle expanded" onclick="toggleSection(this, '#uploadFile')" >
                                                <h:outputText value="#{labels['examOrder.files']}"/>
                                                <i class="fas fa-caret-right"></i>
                                            </p:commandLink>

                                            <p:fileUpload id="fileUpload" listener="#{examOrderEdit.uploadFileListener}"
                                                          dragDropSupport="true" mode="advanced" multiple="true" auto="true"
                                                          styleClass="ui-button-success ml-3"
                                                          label="#{labels['examOrder.files']}" update="formExamOrder:filesList">
                                            </p:fileUpload>

                                        </div>

                                        <div id="uploadFile" class="grid ui-fluid">

                                            <h:panelGroup id="filesList" layout="block" class="col-12 grid-nogutter">

                                                <div class="list-container">

                                                    <p:dataTable var="row" value="#{examOrderEdit.filesList}" size="small" styleClass="myTable" id="fileList"
                                                                 rowIndexVar="idx" rendered="#{examOrderEdit.filesList.size() > 0}" style="width: 99%" >

                                                        <p:column style="width:30px" headerText="#{ui_labels['general.No-symbol']}">
                                                            <h:outputText value="#{idx + 1}" />
                                                        </p:column>

                                                        <p:column style="width:40px; text-align: center">
                                                            <p:commandButton icon="pi pi-download" ignoreAutoUpdate="true" ajax="false"
                                                                             action="#{examOrderEdit.download(row)}" title="#{ui_labels['general.download']}"/>
                                                        </p:column>

                                                        <p:column headerText="#{ui_labels['general.filename']}">
                                                            <h:outputText value="#{row.filename}" />
                                                        </p:column>

                                                        <p:column style="width:40px; text-align: center">
                                                            <p:commandButton icon="fas fa-times" update="formExamOrder:filesList" styleClass="ui-button-danger"
                                                                             partialSubmit="true" process="formExamOrder:filesList @this"
                                                                             action="#{examOrderEdit.actionRemoveFile(row)}" title="#{ui_labels['general.remove']}"/>
                                                        </p:column>

                                                    </p:dataTable>

                                                </div>

                                            </h:panelGroup>

                                        </div>

                                    </div>

                                </div>

                            </div>

                        </div>

                        <!-- Таблица на лицата в протокола да се видят преди да има запис -->
                        <h:panelGroup id="panelPersonsInProt">

                            <h:panelGroup rendered="#{examOrderEdit.orderExam.id eq null and examOrderEdit.orderExam.zaiavDate ne null}">

                                <div class="title-group">
                                    <p:commandLink class="extended-search-toggle expanded" onclick="toggleSection(this, '#personsInProtNew')">
                                        <h:outputText value="#{labels['examOrder.personsInProt']}"/>
                                        <i class="fas fa-caret-right"></i>
                                    </p:commandLink>
                                </div>

                                <div id="personsInProtNew" class="grid">

                                <div class="table-toolbar">
                                    <h:outputText value="#{labels['examOrder.totalNumber']}: #{examOrderEdit.licaListForProtTest.size()}" styleClass="form-label mr-2" rendered="#{!examOrderEdit.do2019}"/>
                                    <h:outputText value="#{labels['examOrder.totalNumber']}: #{examOrderEdit.licaListForProtCase.size()}" styleClass="form-label mr-2" rendered="#{examOrderEdit.do2019}"/>
                                </div>

                                <p:dataTable id="personsTestListTbl" value="#{examOrderEdit.licaListForProtTest}" var="row"
                                             rowIndexVar="idx" emptyMessage="#{ui_labels['general.norows']}" rendered="#{!examOrderEdit.do2019}"
                                             sortMode="single" reflow="true" scrollable="true" style="width: 99.9%;"
                                             paginatorTemplate="{RowsPerPageDropdown} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
                                             rows="10" rowsPerPageTemplate="5,10, 15, 20,25" paginatorPosition="bottom" paginatorAlwaysVisible="true" paginator="true">

                                    <p:column width="30" headerText="#{ui_labels['general.No-symbol']}">
                                        <h:outputText value="#{idx + 1}" />
                                    </p:column>

                                    <p:column width="35" exportable="false">
                                        <p:button icon="fas fa-eye" title="#{labels['traineeshipOrder.dosie']}" target="_blank"
                                                  outcome="dossierPersonView.xhtml" ajax="false" styleClass="ui-button">
                                            <f:param  name="idLice" value="#{row[0]}"/>
                                        </p:button>
                                    </p:column>

                                    <p:column width="150" sortBy="#{row[3]}" headerText="#{labels['examOrder.firstName']}"
                                              filterBy="#{row[3]}" filterMatchMode="contains" filterPlaceholder="#{labels['examOrder.filterFirstName']}">
                                        <h:outputText value="#{row[3]}"  />
                                    </p:column>

                                    <p:column width="150" sortBy="#{row[4]}" headerText="#{labels['examOrder.prezime']}"
                                              filterBy="#{row[4]}" filterMatchMode="contains" filterPlaceholder="#{labels['examOrder.filterPrezime']}">
                                        <h:outputText value="#{row[4]}"  />
                                    </p:column>

                                    <p:column width="150" sortBy="#{row[5]}" headerText="#{labels['examOrder.lastName']}"
                                              filterBy="#{row[5]}" filterMatchMode="contains" filterPlaceholder="#{labels['examOrder.filterLastName']}">
                                        <h:outputText value="#{row[5]}"  />
                                    </p:column>

                                    <p:column width="110" sortBy="#{row[1]}" headerText="#{labels['examOrder.egn']}"
                                              filterBy="#{row[1] ne null ? row[1] : row[2]}" filterMatchMode="contains" filterPlaceholder="#{labels['examOrder.filterEgn']}">
                                        &#160;<h:outputText value="#{row[1]}"  />
                                        <h:outputText value="#{row[2]}" rendered="#{row[2] ne null}"/>
                                    </p:column>

                                    <p:column width="200" sortBy="#{row[8]}" headerText="#{labels['examOrder.examApplication']}">
                                        <h:outputText value="#{row[8]}"  /> /
                                        <h:outputText value="#{row[9]}">
                                            <f:convertDateTime pattern="dd.MM.yyyy" timeZone="#{examOrderEdit.timeZone}"/>
                                        </h:outputText>
                                    </p:column>

                                    <p:column width="120" sortBy="#{row[12]}" headerText="#{labels['examOrder.numPaperWork']}" rendered="#{!examOrderEdit.do2019}">
                                        <h:outputText value="#{row[12]}"  />
                                    </p:column>

                                    <p:column width="120" sortBy="#{row[13]}" headerText="#{labels['examOrder.numCorrectAns']}" rendered="#{!examOrderEdit.do2019}">
                                        <h:outputText value="#{row[13]}"  />
                                    </p:column>

                                    <p:column width="120" sortBy="#{row[14]}" headerText="#{examOrderEdit.do2019 ? labels['examOrder.ratingExam'] : labels['examOrder.ratingFirstPart']}">
                                        <h:outputText value="#{row[14]}"  />
                                    </p:column>

                                    <p:column width="180" sortBy="#{row[15]}" headerText="#{labels['examOrder.note']}">
                                        <h:outputText value="#{row[15]}"  />
                                    </p:column>

                                </p:dataTable>

                                <p:dataTable id="personsCaseListTbl" value="#{examOrderEdit.licaListForProtCase}" var="row"
                                             rowIndexVar="idx" emptyMessage="#{ui_labels['general.norows']}" rendered="#{examOrderEdit.do2019}"
                                             sortMode="single" reflow="true" scrollable="true" style="width: 99.9%;"
                                             paginatorTemplate="{RowsPerPageDropdown} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
                                             rows="10" rowsPerPageTemplate="5,10, 15, 20,25" paginatorPosition="bottom" paginatorAlwaysVisible="true" paginator="true" >

                                    <p:column width="30" headerText="#{ui_labels['general.No-symbol']}">
                                        <h:outputText value="#{idx + 1}" />
                                    </p:column>

                                    <p:column width="35" exportable="false">
                                        <p:button icon="fas fa-eye" title="#{labels['traineeshipOrder.dosie']}" target="_blank"
                                                  outcome="dossierPersonView.xhtml" ajax="false" styleClass="ui-button">
                                            <f:param  name="idLice" value="#{row[0]}"/>
                                        </p:button>
                                    </p:column>

                                    <p:column width="150" sortBy="#{row[3]}" headerText="#{labels['examOrder.firstName']}"
                                              filterBy="#{row[3]}" filterMatchMode="contains" filterPlaceholder="#{labels['examOrder.filterFirstName']}">
