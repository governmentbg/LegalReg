# POSTGRESQL Server db settings
db.vendor.name=POSTGRESQL

urireg.data.source=java:jboss/datasources/AdvoregPostgreDS

hibernate.connection.driver_class=org.postgresql.Driver
hibernate.connection.url=jdbc:postgresql://SOME_DB_HOST:5432/advoreg
hibernate.connection.username=XXXXXXX
hibernate.connection.password=YYYYYYY
hibernate.connection.isolation=2

hibernate.dialect=org.hibernate.community.dialect.PostgreSQL95Dialect
hibernate.current_session_context_class=thread
hibernate.show_sql=false
hibernate.format_sql=false
system.model.id=181

#FOR QUARTZ
driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
